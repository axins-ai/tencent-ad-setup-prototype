.tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: #E6F7FF; color: #1890FF; border-radius: 999px; font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.animate-fadeIn { animation: fadeIn 0.2s ease-out; }

  <script>
  function doReturn() {
    if (window.__doSaveForm) window.__doSaveForm();
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'TASK_FORM_SAVE' }, '*');
    }
    try { window.parent.closeForm(); } catch(e) {}
  }
