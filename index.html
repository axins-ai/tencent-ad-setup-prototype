<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdBatch 原型</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<script src="region-data.js"></script>
</head>
<body style="margin:0;font-family:sans-serif;background:#F0F2F5;">

<div id="app-container" style="display:flex;height:100vh;">
  <div id="left-menu" style="width:256px;min-width:256px;height:100vh;background:white;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;">
    <div style="padding:20px;border-bottom:1px solid #e5e7eb;">
      <h1 style="font-size:18px;font-weight:bold;color:#1890FF;margin:0;">AdBatch</h1>
    </div>
    <nav style="flex:1;padding:12px;display:flex;flex-direction:column;gap:2px;">
      <button id="menu-task-list" onclick="showView('task-list')" style="width:100%;display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;border:none;background:#E6F7FF;color:#1890FF;font-weight:600;font-size:14px;cursor:pointer;">
        📋 任务列表
      </button>
      <button id="menu-targeting" onclick="showView('targeting-packages')" style="width:100%;display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;border:none;background:transparent;color:#333;font-weight:400;font-size:14px;cursor:pointer;">
        🎯 定向包
      </button>
      <button id="menu-creative" onclick="showView('creative-assets')" style="width:100%;display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;border:none;background:transparent;color:#333;font-weight:400;font-size:14px;cursor:pointer;">
        🖼️ 创意资产
      </button>
      <button id="menu-copy" onclick="showView('copy-library')" style="width:100%;display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;border:none;background:transparent;color:#333;font-weight:400;font-size:14px;cursor:pointer;">
        📝 文案库
      </button>
    </nav>
  </div>

  <div id="main-content" style="margin-left:256px;flex:1;height:100vh;overflow:auto;">
    <!-- 任务列表 -->
    <div id="view-task-list" style="display:block;padding:32px 24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
        <h2 style="font-size:24px;font-weight:bold;color:#111827;margin:0;">批创工具</h2>
        <div style="position:relative;">
          <button onclick="toggleDropdown()" style="background:#1890FF;color:white;font-size:16px;padding:12px 24px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;">
            ➕ 新增批创任务 <span>▼</span>
          </button>
          <div id="channel-dropdown" style="display:none;position:absolute;top:100%;right:0;background:white;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,0.15);min-width:200px;z-index:200;">
            <div onclick="selectChannel('gdt')" style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;">🎯 广点通</div>
          </div>
        </div>
      </div>
      <div id="task-list-content"></div>
    </div>

    <!-- 表单 -->
    <div id="view-form" style="display:none;height:100%;">
      <iframe id="form-frame" src="form.html" style="width:100%;height:100vh;border:none;"></iframe>
    </div>

    <!-- 定向包 -->
    <div id="view-targeting-packages" style="display:none;padding:32px 24px;">
      <h2>定向包</h2>
      <p>功能开发中...</p>
    </div>

    <!-- 创意资产 -->
    <div id="view-creative-assets" style="display:none;padding:32px 24px;">
      <h2>创意资产</h2>
      <p>功能开发中...</p>
    </div>

    <!-- 文案库 -->
    <div id="view-copy-library" style="display:none;padding:32px 24px;">
      <h2>文案库</h2>
      <p>功能开发中...</p>
    </div>
  </div>
</div>

<script>
(function() {
  console.log("✅ JS loaded");
  
  // 视图切换
  window.showView = function(name) {
    var views = ["task-list", "form", "targeting-packages", "creative-assets", "copy-library"];
    for (var i = 0; i < views.length; i++) {
      var el = document.getElementById("view-" + views[i]);
      if (el) el.style.display = (views[i] === name) ? "block" : "none";
    }
    // 高亮菜单
    var menus = {"task-list": "menu-task-list", "targeting-packages": "menu-targeting", "creative-assets": "menu-creative", "copy-library": "menu-copy"};
    var keys = Object.keys(menus);
    for (var j = 0; j < keys.length; j++) {
      var btn = document.getElementById(menus[keys[j]]);
      if (btn) btn.style.background = (keys[j] === name) ? "#E6F7FF" : "transparent";
    }
  };
  
  // 下拉菜单
  window.toggleDropdown = function() {
    var dd = document.getElementById("channel-dropdown");
    if (dd) dd.style.display = (dd.style.display === "block") ? "none" : "block";
  };
  
  window.selectChannel = function(ch) {
    var dd = document.getElementById("channel-dropdown");
    if (dd) dd.style.display = "none";
    alert("选择渠道: " + ch);
  };
  
  // 点击其他地方关闭下拉
  document.addEventListener("click", function(e) {
    var dd = document.getElementById("channel-dropdown");
    if (!dd || dd.style.display !== "block") return;
    var btn = e.target.closest("button[onclick*='toggleDropdown']");
    var inDD = e.target.closest("#channel-dropdown");
    if (!btn && !inDD) dd.style.display = "none";
  });
  
  console.log("✅ All functions defined");
})();
</script>
</body>
</html>
